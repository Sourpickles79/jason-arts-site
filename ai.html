  </footer>
  <script src="assets/js/header.js"></script>
  <script src="assets/js/subhero-variants.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const items = [
      { type: "Short", kind: "video", src: "assets/videos/ash-flux-last-trip-to-nowhere.mp4", poster: "assets/images/poster-ash-flux-last-trip-to-nowhere.jpg", title: "Ash + Flux: Last Trip to Nowhere", desc: "A road-trip story built around two characters and a sense of open-ended momentum." },
      { type: "Short", kind: "video", src: "assets/videos/contactvoid.mp4", poster: "assets/images/poster-contactvoid.jpg", title: "Contact Void", desc: "An atmospheric AI-generated short exploring isolation and first contact." },
      { type: "Short", kind: "video", src: "assets/videos/corgoandhisfavsock.mp4", poster: "assets/images/poster-corgoandhisfavsock.jpg", title: "Corgo and His Favorite Sock", desc: "A playful animated test built around character charm and comedic timing." },
      { type: "Short", kind: "video", src: "assets/videos/neonsips-samplemarketingclip.mp4", poster: "assets/images/poster-neonsips-samplemarketingclip.jpg", title: "Neon Sips", desc: "A sample marketing clip exploring product energy through AI-driven visuals." },
      { type: "Short", kind: "video", src: "assets/videos/proudwarrior.mp4", poster: "assets/images/poster-proudwarrior.jpg", title: "Proud Warrior", desc: "A short character study built around pose, presence, and light." },
      { type: "Short", kind: "video", src: "assets/videos/roaring_engine__screeching_tires.mp4", poster: "assets/images/poster-roaring_engine__screeching_tires.jpg", title: "Roaring Engine, Screeching Tires", desc: "A fast, motion-driven test focused on speed, sound, and impact." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-01.webp", title: "Story Frame — Act 2", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-02.webp", title: "Story Frame — Act 3", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-03.webp", title: "Story Frame — Act 3", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-04.webp", title: "Story Frame — Act 4", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-05.webp", title: "Story Frame — Act 5", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-06.webp", title: "Story Frame — Act 5", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-07.webp", title: "Story Frame — Act 6", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-08.webp", title: "Story Frame — Act 6", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-09.webp", title: "Story Frame — Act 7", desc: "Development still." },
      { type: "Frame", kind: "image", src: "assets/images/ai-still-10.webp", title: "Story Frame — Act 7", desc: "Development still." },
      { type: "Concept", kind: "image", src: "assets/images/ai-concept-01.webp", title: "Concept Study", desc: "AI concept art." },
      { type: "Concept", kind: "image", src: "assets/images/ai-concept-02.webp", title: "Concept Study", desc: "AI concept art." },
      { type: "Concept", kind: "image", src: "assets/images/ai-concept-03.webp", title: "Concept Study", desc: "AI concept art." },
      { type: "Concept", kind: "image", src: "assets/images/ai-concept-04.webp", title: "Concept Study", desc: "AI concept art." },
      { type: "Concept", kind: "image", src: "assets/images/ai-concept-05.webp", title: "Concept Study", desc: "AI concept art." },
      { type: "Concept", kind: "image", src: "assets/images/ai-concept-06.webp", title: "Concept Study", desc: "AI concept art." }
    ];

    function cardHtml(item) {
      const media = item.kind === "video"
        ? `<video controls preload="none" poster="${item.poster}"><source src="${item.src}" type="video/mp4"></video><span class="play-badge" aria-hidden="true">&#9654;</span>`
        : `<img src="${item.src}" alt="${item.title}" loading="lazy">`;
      return `
        <article class="ai-card" data-category="${item.type}">
          <div class="ai-media">${media}</div>
          <div class="ai-card-body">
            <span class="category">${item.type === "Short" ? "AI Short" : item.type === "Frame" ? "Story Frame" : "Concept Art"}</span>
            <h3>${item.title}</h3>
            <p>${item.desc}</p>
          </div>
        </article>
      `;
    }

    document.getElementById("aiGrid").innerHTML = items.map(cardHtml).join("");

    document.querySelectorAll(".ai-media video").forEach(video => {
      const media = video.closest(".ai-media");
      video.addEventListener("play", () => media.classList.add("is-playing"));
      video.addEventListener("pause", () => media.classList.remove("is-playing"));
    });

    document.querySelectorAll(".filter").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
        button.classList.add("active");
        const filter = button.dataset.filter;
        document.querySelectorAll(".ai-card").forEach(card => {
          card.hidden = filter !== "all" && card.dataset.category !== filter;
        });
      });
    });
  </script>
