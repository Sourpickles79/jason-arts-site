  <main>
    <section class="subhero">
      <img src="assets/images/hero-mountain.webp" alt="Cinematic mountain landscape by Jason Arts">
      <div class="hero-shade"></div>
      <div class="hero-content">
        <p class="eyebrow">Blog</p>
        <h1>Notes on AI, music, and world-building.</h1>
        <p class="intro">Behind-the-scenes posts on AI filmmaking, AI music, animated shorts like The Orb Story, and creative tips.</p>
      </div>
    </section>

    <section class="section">
      <div class="blog-grid" id="blogGrid"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="brand"><img src="assets/images/jason-arts-logo.jpg" alt="" aria-hidden="true"><small>Jason Arts</small></div>
    <p>© <span id="year"></span> Jason Arts. All rights reserved.</p>
  </footer>

  <script src="assets/js/header.js"></script>
  <script src="assets/js/subhero-variants.js"></script>
  <script src="assets/data/content.js"></script>
  <script>
    function formatDate(value) {
      const d = new Date(value + "T00:00:00");
      if (isNaN(d)) return value;
      return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }
    function renderBlog() {
      document.getElementById("year").textContent = new Date().getFullYear();
      const posts = (window.SITE_CONTENT && window.SITE_CONTENT.blogPosts) || [];
      const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
      const grid = document.getElementById("blogGrid");
      if (!sorted.length) {
        grid.innerHTML = `<p class="notice">No posts yet — check back soon.</p>`;
        return;
      }
      grid.innerHTML = sorted.map(post => `
        <a class="blog-card" href="${post.url}">
          <img src="${post.cover}" alt="${post.title}" loading="lazy">
          <div class="blog-card-body">
            <div class="blog-meta"><span>${post.category}</span><span class="dot">&middot;</span><span>${formatDate(post.date)}</span></div>
            <h3>${post.title}</h3>
            <p>${post.excerpt}</p>
          </div>
        </a>
      `).join("");
    }
    renderBlog();
  </script>
</body>
</html>
